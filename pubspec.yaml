name: csen268_final_project
description: "Yard Sale Treasure Map - CSEN 268 Final Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

  # ── Added for new features ──────────────────────────────
  go_router: ^14.6.2            # Feature 5: centralized navigation
  share_plus: ^10.1.2           # Feature 6: share sale listings
  cached_network_image: ^3.4.1  # Feature 3: cached image loading
  firebase_messaging: ^16.0.0   # Feature 4: push notifications
  flutter_local_notifications: ^18.0.1  # Feature 4: foreground notifications

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
